version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sop-exam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: chenjiang
      MYSQL_DATABASE: sop-exam
      TZ: Asia/Shanghai
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --default-time-zone='+08:00'

volumes:
  mysql_data:
